<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contratos · PTA — Painel de assinaturas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f5f4f1; --card:#fffefb; --ink:#16181c; --muted:#6c7079; --faint:#a4a8b0;
    --line:#e4e2dc; --line-2:#edebe5;
    --signed:#2e7d56; --signed-bg:#e6f1ea;
    --pending:#b3741b; --pending-bg:#f6ecdb;
    --over:#b23b2f; --over-bg:#f6e3df;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Hanken Grotesk',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;padding:0 0 80px;font-size:15px}
  .wrap{max-width:1080px;margin:0 auto;padding:0 32px}
  header{padding:48px 0 30px;border-bottom:1px solid var(--line);margin-bottom:38px;display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap}
  header .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  header h1{font-size:38px;font-weight:800;letter-spacing:-.02em;line-height:1}
  header .meta{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--muted);line-height:1.9}
  header .meta b{color:var(--ink);font-weight:600}
  .badge{display:inline-flex;align-items:center;gap:8px;margin-top:12px;padding:6px 12px;border:1px solid var(--signed);color:var(--signed);border-radius:999px;font-family:'IBM Plex Mono',monospace;font-size:11px}
  .badge::before{content:"✓";font-weight:700}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card);margin-bottom:46px}
  .kpi{padding:22px 24px;border-right:1px solid var(--line)}
  .kpi:last-child{border-right:none}
  .kpi .l{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .kpi .v{font-size:42px;font-weight:800;letter-spacing:-.03em;margin:8px 0 2px;line-height:1}
  .kpi .s{font-size:12.5px;color:var(--faint)}
  .kpi.s .v{color:var(--signed)} .kpi.p .v{color:var(--pending)} .kpi.o .v{color:var(--over)}
  .sec{display:flex;align-items:baseline;gap:12px;margin:0 0 20px}
  .sec .n{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--faint)}
  .sec h2{font-size:19px;font-weight:700;letter-spacing:-.01em}
  .sec .t{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
  section{margin-bottom:52px}
  .split{display:grid;grid-template-columns:1.2fr .8fr;gap:40px;align-items:start}
  .mrow{display:grid;grid-template-columns:78px 1fr 56px 44px;gap:14px;align-items:center;padding:13px 0;border-bottom:1px solid var(--line-2)}
  .mrow:last-child{border-bottom:none}
  .mrow .ml{font-weight:600;font-size:14px}
  .track{height:8px;background:var(--line-2);border-radius:4px;overflow:hidden;display:flex}
  .track .ts{background:var(--signed)} .track .tp{background:var(--pending);opacity:.55}
  .mrow .mr{text-align:right;font-weight:700;font-size:15px}
  .mrow .mt{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--faint)}
  .wk{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-items:end;height:170px}
  .wcol{display:flex;flex-direction:column;align-items:center;gap:8px;justify-content:flex-end;height:100%}
  .wbar{width:100%;max-width:52px;background:var(--line-2);border-radius:4px 4px 0 0;display:flex;flex-direction:column-reverse;overflow:hidden;min-height:4px}
  .wbar .bs{background:var(--signed)} .wbar .bp{background:var(--pending);opacity:.55}
  .wnum{font-weight:800;font-size:22px}
  .wlab{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);text-align:center;line-height:1.4}
  .turmas{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card)}
  .trow{border-bottom:1px solid var(--line-2)}
  .trow:last-child{border-bottom:none}
  .thead{display:grid;grid-template-columns:140px 1fr 70px 64px 22px;gap:16px;align-items:center;padding:16px 22px;cursor:pointer;background:none;border:none;width:100%;text-align:left;font-family:inherit;color:inherit;transition:background .15s}
  .thead:hover{background:#faf8f3}
  .tname{font-weight:700;font-size:14px}
  .tbar{height:8px;background:var(--line-2);border-radius:4px;overflow:hidden}
  .tbar i{display:block;height:100%;background:var(--signed);border-radius:4px}
  .trow.low .tbar i{background:var(--pending)} .trow.crit .tbar i{background:var(--over)}
  .tpct{font-weight:800;font-size:20px;text-align:right;letter-spacing:-.02em}
  .trow.crit .tpct{color:var(--over)}
  .tcount{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--muted);text-align:right}
  .chev{justify-self:center;color:var(--faint);transition:transform .25s;font-size:13px}
  .trow.open .chev{transform:rotate(90deg)}
  .panel{max-height:0;overflow:hidden;transition:max-height .35s ease}
  .trow.open .panel{max-height:1400px}
  .panel-in{padding:4px 22px 22px}
  .panel-in .hint{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin:6px 0 14px;padding-top:14px;border-top:1px dashed var(--line)}
  .alist{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px}
  .aitem{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line-2)}
  .adot{width:8px;height:8px;border-radius:50%;flex:none}
  .adot.y{background:var(--signed)} .adot.n{background:var(--pending)}
  .aname{font-size:13.5px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .aname small{display:block;color:var(--faint);font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:400}
  .atag{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 8px;border-radius:5px;white-space:nowrap}
  .atag.y{background:var(--signed-bg);color:var(--signed)} .atag.n{background:var(--pending-bg);color:var(--pending)}
  .nolink{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--over);margin-left:6px}
  footer{margin-top:40px;padding-top:22px;border-top:1px solid var(--line);font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--faint);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
  @media(max-width:820px){.kpis,.alist{grid-template-columns:1fr 1fr}.split{grid-template-columns:1fr;gap:46px}.kpi{border-bottom:1px solid var(--line)}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">Analista de Contratos · Autentique × PTA</div>
      <h1>Painel de assinaturas</h1>
      <span class="badge" id="badge"></span>
    </div>
    <div class="meta">
      <div>GERADO · <b id="ts"></b></div>
      <div>JANELA · <b id="janela"></b></div>
      <div>FONTE · <b>api.autentique.com.br</b></div>
    </div>
  </header>

  <div class="kpis" id="kpis"></div>

  <section>
    <div class="split">
      <div>
        <div class="sec"><span class="n">01</span><h2>Controle macro · mês a mês</h2></div>
        <div id="months"></div>
      </div>
      <div>
        <div class="sec"><span class="n">02</span><h2 id="weeks-title">Mês atual · semana a semana</h2></div>
        <div class="wk" id="weeks"></div>
      </div>
    </div>
  </section>

  <section>
    <div class="sec"><span class="n">03</span><h2>Resumo turma a turma</h2><span class="t" id="turma-sub">clique para ver os alunos</span></div>
    <div class="turmas" id="turmas"></div>
  </section>

  <footer>
    <span>PTA · Analista de Contratos · plugin contratos-pta</span>
    <span id="cobertura"></span>
  </footer>
</div>

<script>
const DATA = __PAINEL_DATA__;

document.getElementById('ts').textContent = DATA.geradoEm;
document.getElementById('janela').textContent = DATA.janela;
document.getElementById('weeks-title').textContent = DATA.mesAtual + ' · semana a semana';
document.getElementById('turma-sub').textContent = 'clique para ver os alunos · ' + DATA.mesAtual;
document.getElementById('badge').textContent = 'Varredura completa · ' + DATA.kpi.docsVarridos + ' docs · ' + DATA.cobertura.length + ' janelas';
document.getElementById('cobertura').textContent = DATA.cobertura.map(c => c.label + ': ' + c.docs + ' docs/' + c.paginas + 'p').join('  ·  ');

const k = DATA.kpi;
document.getElementById('kpis').innerHTML = `
  <div class="kpi"><div class="l">Contratos · ${DATA.cobertura.length}m</div><div class="v">${k.total}</div><div class="s">emitidos no período</div></div>
  <div class="kpi s"><div class="l">Assinados</div><div class="v">${k.assinados}</div><div class="s">${k.taxaPct}% de conversão</div></div>
  <div class="kpi p"><div class="l">Pendentes</div><div class="v">${k.pendentes}</div><div class="s">aguardando</div></div>
  <div class="kpi o"><div class="l">Vencidos +30d</div><div class="v">${k.vencidos}</div><div class="s">${k.semLink} sem abrir o link</div></div>`;

const maxM = Math.max(...DATA.meses.map(m => m.total), 1);
document.getElementById('months').innerHTML = DATA.meses.map(m => {
  const sw = m.total ? m.assinados/m.total*100 : 0, pw = m.total ? m.pendentes/m.total*100 : 0, w = m.total/maxM*100;
  return `<div class="mrow"><div class="ml">${m.label}</div>
    <div class="track" style="width:${w}%;min-width:90px"><span class="ts" style="width:${sw}%"></span><span class="tp" style="width:${pw}%"></span></div>
    <div class="mr">${m.taxaPct}%</div><div class="mt">${m.total}</div></div>`;
}).join('');

const maxW = Math.max(...DATA.semanas.map(s => s.total), 1);
document.getElementById('weeks').innerHTML = DATA.semanas.map(s => {
  const h = s.total/maxW*140, sh = s.total ? s.assinados/s.total*100 : 0, ph = s.total ? (s.total-s.assinados)/s.total*100 : 0;
  return `<div class="wcol"><div class="wnum" style="${!s.total?'color:var(--faint)':''}">${s.total||'·'}</div>
    <div class="wbar" style="height:${Math.max(h,6)}px"><div class="bp" style="height:${ph}%"></div><div class="bs" style="height:${sh}%"></div></div>
    <div class="wlab">${s.label} · ${s.range}${s.total?'<br>'+s.taxaPct+'%':''}</div></div>`;
}).join('');

document.getElementById('turmas').innerHTML = DATA.turmas.map((t, i) => {
  const cls = t.taxaPct === 0 ? 'crit' : (t.taxaPct < 70 ? 'low' : '');
  const alunos = t.alunos.map(a => `<div class="aitem"><span class="adot ${a.a?'y':'n'}"></span>
    <div class="aname">${a.n}${a.e?`<small>${a.e}</small>`:''}</div>
    <span class="atag ${a.a?'y':'n'}">${a.a?'assinado':'pendente '+a.d+'d'}</span>
    ${!a.l&&!a.a?'<span class="nolink">sem abrir</span>':''}</div>`).join('');
  return `<div class="trow ${cls}" data-i="${i}">
    <button class="thead" onclick="toggle(${i})">
      <span class="tname">${t.turma}</span>
      <span class="tbar"><i style="width:${t.taxaPct}%"></i></span>
      <span class="tpct">${t.taxaPct}%</span>
      <span class="tcount">${t.assinados}/${t.total}</span>
      <span class="chev">▸</span>
    </button>
    <div class="panel"><div class="panel-in">
      <div class="hint">${t.total} alunos · ${t.assinados} assinaram · ${t.pendentes} pendentes</div>
      <div class="alist">${alunos}</div>
    </div></div>
  </div>`;
}).join('');

function toggle(i){document.querySelector(`.trow[data-i="${i}"]`).classList.toggle('open');}
</script>
</body>
</html>
